<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>✅ Verificador Anulados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 0; }
        .scan-section { text-align: center; padding: 20px; border: 2px solid #e9ecef; border-radius: 10px; }
        input[type="text"], input[type="number"] { width: 90%; padding: 15px; font-size: 24px; border: 2px solid #1a73e8; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat-box { padding: 15px; border-radius: 8px; width: 40%; color: white; font-weight: bold; }
        .goal { background-color: #6c757d; }
        .current { background-color: #007bff; }
        #mensaje { margin: 20px 0; padding: 20px; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
        .match { background-color: #28a745; color: white; }
        .danger { background-color: #dc3545; color: white; }
        .info { background-color: #e7f3ff; color: #004085; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background-color: #17a2b8; margin-top: 10px; }
        #statusDot { position: absolute; top: 25px; right: 25px; width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .online { background: #28a745 !important; }
        .offline { background: #dc3545 !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 10px; text-align: center; width: 350px; }
        .adv-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; font-size: 0.85em; }
        .adv-item { background: #f8f9fa; padding: 8px; border-radius: 5px; border: 1px solid #eee; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="modalOp" class="overlay">
    <div class="modal">
        <h3>Nombre del Operario</h3>
        <input type="text" id="nombreOperario" placeholder="Responsable" style="font-size: 20px;">
        <button class="btn" onclick="iniciarApp()">Registrarse</button>
    </div>
</div>

<div class="container">
    <div id="statusDot"></div>
    <h2>🛃 Control de pedidos/reclamos</h2>
    <div class="scan-section">
        <div id="infoOp" style="text-align: right; color: #666; font-size: 0.8em;"></div>
        <input type="text" id="scannerInput" inputmode="numeric" placeholder="ESCANEE AQUÍ..." disabled>
        <input type="number" id="quantityInput" placeholder="CANTIDAD" min="1" disabled>
        <div class="stats">
            <div class="stat-box goal">Sistema: <span id="metaCant">0</span></div>
            <div class="stat-box current">Escaneado: <span id="actualCant">0</span></div>
        </div>
        <div class="adv-stats">
            <div class="adv-item">✅ Cuadrados: <span id="countOK">0</span></div>
            <div class="adv-item">⚠️ Faltantes: <span id="countGap">0</span></div>
            <div class="adv-item">🚫 No tocados: <span id="countNew">0</span></div>
            <div class="adv-item">⬆️ Sobrantes: <span id="countOver">0</span></div>
        </div>
        <div id="mensaje" class="info">Conectando...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDOPmWV9pKa0NZCh6BZb46fea8QigvN8vI", authDomain: "anulados-7a9b8.firebaseapp.com", projectId: "anulados-7a9b8", storageBucket: "anulados-7a9b8.firebasestorage.app", messagingSenderId: "296934856812", appId: "1:296934856812:web:1fc755633ceddd28712049" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let baseLocal = {}, opNombre = "";
    const input = document.getElementById('scannerInput'), qInput = document.getElementById('quantityInput'), msg = document.getElementById('mensaje');

    // REINICIO AUTOMÁTICO
    let initLoad = true;
    onSnapshot(doc(db, "config", "reset"), () => { if(!initLoad) location.reload(); initLoad = false; });

    window.iniciarApp = () => {
        opNombre = document.getElementById('nombreOperario').value.trim();
        if(!opNombre) return alert("Ingrese nombre");
        document.getElementById('modalOp').style.display = 'none';
        document.getElementById('infoOp').innerText = "Responsable: " + opNombre;
        input.disabled = false; qInput.disabled = false; input.focus();
    }
    document.getElementById('nombreOperario').addEventListener('keypress', (e) => { if(e.key === 'Enter') iniciarApp(); });

    onSnapshot(collection(db, "pedidos"), (snap) => {
        let cOK=0, cGap=0, cNew=0, cOver=0;
        snap.forEach(doc => {
            const d = doc.data(); baseLocal[doc.id] = d;
            if(d.a === 0) cNew++; else if(d.a === d.m) cOK++; else if(d.a < d.m) cGap++; else cOver++;
        });
        document.getElementById('countOK').innerText = cOK; document.getElementById('countGap').innerText = cGap;
        document.getElementById('countNew').innerText = cNew; document.getElementById('countOver').innerText = cOver;
    });

    // LÓGICA DE NAVEGACIÓN CON ENTER RESTAURADA
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter' && input.value) qInput.focus(); });
    qInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') procesarEscaneo(); });

    function procesarEscaneo() {
        const cod = input.value.trim(), cant = parseInt(qInput.value) || 1, item = baseLocal[cod];
        if(item) {
            item.a += cant;
            let cl = (item.a === item.m) ? "match" : (item.a > item.m ? "danger" : "info");
            msg.innerText = `Procesado: ${cod} | Ubicación: ${item.p}`;
            msg.className = cl;
            document.getElementById('metaCant').innerText = item.m;
            document.getElementById('actualCant').innerText = item.a;
            updateDoc(doc(db, "pedidos", cod), { a: increment(cant), ops: arrayUnion(opNombre) });
        } else { msg.innerText = `❌ No existe: ${cod}`; msg.className = "danger"; }
        input.value = ""; qInput.value = ""; input.focus();
    }

    window.addEventListener('online', () => document.getElementById('statusDot').className = 'online');
    window.addEventListener('offline', () => document.getElementById('statusDot').className = 'offline');
    document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false; };
</script>
</body>
</html>
